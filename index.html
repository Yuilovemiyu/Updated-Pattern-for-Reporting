<!DOCTYPE html>
<html>
<head>
  <title>Report System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <style>
    body { font-family: Arial; padding: 15px; }
    input, select, button { width: 100%; padding: 8px; margin: 5px 0; }
  </style>
</head>

<body>

<div id="authBox">
  <h3>Login</h3>

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button onclick="login()">Login</button>
  <button onclick="signup()">Sign Up</button>
</div>

<div id="app" style="display:none;">
  <h2>Dashboard</h2>

  <select id="store"></select>

  <p id="status"></p>

  <button onclick="logout()">Logout</button>
</div>

<script>

/////////////////////////////
// 🔥 FIREBASE (YOUR INSERTED CONFIG)
/////////////////////////////
firebase.initializeApp({
  apiKey: "AIzaSyADXlQJcV5KJXTfYBK5qscv7gd88-XNlKo",
  authDomain: "today-s-reporter-3dceb.firebaseapp.com",
  projectId: "today-s-reporter-3dceb"
});

const auth = firebase.auth();
const db = firebase.firestore();

/////////////////////////////
// STORES (YOUR INSERTED LIST)
/////////////////////////////
const stores = ["Brookside","Manggahan","Bacoor","Dasmarinas","Gentri Jr.",
"Tanza","Kawit","Tanza Paradahan","GMA","Tagaytay","Molino","Paliparan",
"San Pedro","Pacita","Binan Bayan","Crossing East","Anabu (Yssabelle)","Anabu (Ian)","Rosario"];

const storeSelect = document.getElementById("store");

// FIX: wait for DOM before inserting
window.onload = () => {
  stores.forEach(s => {
    let opt = document.createElement("option");
    opt.value = s;
    opt.text = s;
    storeSelect.appendChild(opt);
  });
};

/////////////////////////////
// LOGIN FIX (IMPORTANT)
/////////////////////////////
function login(){
  auth.signInWithEmailAndPassword(email.value, password.value)
    .then(user => {
      console.log("Logged in:", user.user.email);
    })
    .catch(err => {
      alert("Login failed: " + err.message);
      console.error(err);
    });
}

function signup(){
  auth.createUserWithEmailAndPassword(email.value, password.value)
    .then(user => {
      console.log("Signed up:", user.user.email);
    })
    .catch(err => {
      alert("Signup failed: " + err.message);
      console.error(err);
    });
}

function logout(){
  auth.signOut();
}

/////////////////////////////
// AUTH STATE LISTENER (FIXED)
/////////////////////////////
auth.onAuthStateChanged(user => {
  if(user){
    document.getElementById("authBox").style.display = "none";
    document.getElementById("app").style.display = "block";
    status.innerText = "Logged in as: " + user.email;
  } else {
    document.getElementById("authBox").style.display = "block";
    document.getElementById("app").style.display = "none";
  }
});

</script>

</body>
</html>
