<!DOCTYPE html>
<html>
<head>
  <title>HC/PG SA Monthly Report</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <style>
    body { font-family: Arial; padding: 15px; }
    input, select, button { margin: 5px; padding: 8px; width: 100%; }
    table { border-collapse: collapse; margin-top: 20px; width: 100%; }
    th, td { border: 1px solid black; padding: 6px; text-align: center; font-size: 12px; }

    .rest { background:#fff3cd; }
    .working { background:#d4edda; }
    .absent { background:#f8d7da; }

    .delete-btn {
      background: #dc3545;
      color: white;
      border: none;
      padding: 4px 6px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h2>📊 Monthly Store Report (Shared)</h2>

<input type="date" id="date">

<select id="store"></select>

<select id="override">
  <option value="">Auto Status</option>
  <option>Present</option>
  <option>Absent</option>
  <option>On Leave</option>
</select>

<input type="number" id="total" placeholder="Total Apps">
<input type="number" id="signed" placeholder="Signed">
<input type="number" id="rejected" placeholder="Rejected">
<input type="number" id="cancelled" placeholder="Cancelled">

<button onclick="addEntry()">➕ Add Entry</button>
<button onclick="undoLast()">↩️ Undo</button>

<table id="report">
  <tr>
    <th>Date</th><th>Store</th><th>Status</th>
    <th>Total</th><th>Signed</th>
    <th>Rejected</th><th>Cancelled</th><th>Action</th>
  </tr>
</table>

<h3>📅 Monthly Totals</h3>
<table id="monthlyTotals">
  <tr>
    <th>Month</th>
    <th>Total Apps</th>
    <th>Signed</th>
    <th>Rejected</th>
    <th>Cancelled</th>
  </tr>
</table>

<script>
// 🔥 FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyBoPZ6nioxI_fzVrdLSh-pQ_EEqSdPOnrY",
  authDomain: "pattern-for-reporting.firebaseapp.com",
  projectId: "pattern-for-reporting"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// DOM
const storeSelect = document.getElementById("store");
const report = document.getElementById("report");
const override = document.getElementById("override");

// UNDO STACK
let historyStack = [];

// STORE LIST
const stores = [
  {name:"Brookside", rest:"Monday"},
  {name:"Manggahan", rest:"Monday"},
  {name:"Bacoor", rest:"Tuesday"},
  {name:"Dasmarinas", rest:"Tuesday"},
  {name:"Gentri Jr.", rest:"Thursday"},
  {name:"Tanza", rest:"Monday"},
  {name:"Kawit", rest:"Tuesday"},
  {name:"Tanza Paradahan", rest:"Tuesday"},
  {name:"GMA", rest:"Tuesday"},
  {name:"Tagaytay", rest:"Tuesday"},
  {name:"Molino", rest:"Monday"},
  {name:"Paliparan", rest:"Monday"},
  {name:"San Pedro", rest:"Tuesday"},
  {name:"Pacita", rest:"Monday"},
  {name:"Binan Bayan", rest:"Monday"},
  {name:"Crossing East", rest:"Monday"},
  {name:"Anabu (Yssabelle)", rest:"Tuesday"},
  {name:"Anabu (Ian)", rest:"Monday"}
];

// LOAD STORES INTO DROPDOWN
stores.forEach(s=>{
  let opt=document.createElement("option");
  opt.value=s.name;
  opt.text=s.name;
  storeSelect.add(opt);
});

// DAY NAME
function getDayName(d){
  return ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"][new Date(d).getDay()];
}

// ADD ENTRY
function addEntry(){
  const date = document.getElementById("date").value;
  const store = storeSelect.value;

  if(!date || !store) return alert("Select date and store");

  const selectedStore = stores.find(s=>s.name===store);

  let status = override.value || (
    getDayName(date) === selectedStore.rest ? "Rest Day" : "Working"
  );

  const data = {
    date,
    store,
    status,
    total: Number(document.getElementById("total").value || 0),
    signed: Number(document.getElementById("signed").value || 0),
    rejected: Number(document.getElementById("rejected").value || 0),
    cancelled: Number(document.getElementById("cancelled").value || 0),
    timestamp: Date.now()
  };

  // PREVENT DUPLICATE (same date + store)
  db.collection("reports")
    .where("date","==",date)
    .where("store","==",store)
    .get()
    .then(snapshot=>{
      if(!snapshot.empty){
        alert("Entry already exists for this store and date");
        return;
      }

      db.collection("reports").add(data);
    });
}

// REALTIME LOAD
db.collection("reports").orderBy("timestamp").onSnapshot(snapshot=>{
  report.innerHTML = `
    <tr>
      <th>Date</th><th>Store</th><th>Status</th>
      <th>Total</th><th>Signed</th>
      <th>Rejected</th><th>Cancelled</th><th>Action</th>
    </tr>
  `;

  let allData = [];

  snapshot.forEach(doc=>{
    let d = doc.data();
    allData.push(d);

    let row = report.insertRow();
    row.insertCell().innerText = d.date;
    row.insertCell().innerText = d.store;
    row.insertCell().innerText = d.status;
    row.insertCell().innerText = d.total;
    row.insertCell().innerText = d.signed;
    row.insertCell().innerText = d.rejected;
    row.insertCell().innerText = d.cancelled;

    let action = row.insertCell();
    let btn = document.createElement("button");
    btn.innerText = "Delete";
    btn.className = "delete-btn";

    btn.onclick = ()=>{
      historyStack.push({id: doc.id, data: d});
      db.collection("reports").doc(doc.id).delete();
    };

    action.appendChild(btn);

    // COLOR
    if(d.status === "Rest Day") row.classList.add("rest");
    else if(d.status === "Absent") row.classList.add("absent");
    else row.classList.add("working");
  });

  updateMonthlyTotals(allData);
});

// UNDO
function undoLast(){
  if(historyStack.length === 0) return alert("Nothing to undo");

  let last = historyStack.pop();
  db.collection("reports").doc(last.id).set(last.data);
}

// MONTHLY TOTALS
function updateMonthlyTotals(data){
  let totals = {};

  data.forEach(d=>{
    let month = d.date.substring(0,7);

    if(!totals[month]){
      totals[month] = {total:0,signed:0,rejected:0,cancelled:0};
    }

    totals[month].total += d.total;
    totals[month].signed += d.signed;
    totals[month].rejected += d.rejected;
    totals[month].cancelled += d.cancelled;
  });

  let table = document.getElementById("monthlyTotals");

  table.innerHTML = `
    <tr>
      <th>Month</th>
      <th>Total Apps</th>
      <th>Signed</th>
      <th>Rejected</th>
      <th>Cancelled</th>
    </tr>
  `;

  for(let m in totals){
    let row = table.insertRow();
    row.insertCell().innerText = m;
    row.insertCell().innerText = totals[m].total;
    row.insertCell().innerText = totals[m].signed;
    row.insertCell().innerText = totals[m].rejected;
    row.insertCell().innerText = totals[m].cancelled;
  }
}
</script>

</body>
</html>
