<!DOCTYPE html>
<html>
<head>
  <title>HC/PG SA Monthly Report</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

  <style>
    body { font-family: Arial; padding: 15px; }

    input, select, button {
      margin: 5px;
      padding: 8px;
      width: 100%;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      margin-top: 10px;
    }

    th, td {
      border: 1px solid #000;
      padding: 6px;
      text-align: center;
      font-size: 12px;
    }

    #authBox { max-width: 400px; margin:auto; }
    #app { display:none; }

    /* MODAL */
    #bonusModal {
      display:none;
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.7);
      z-index:9999;
    }

    #bonusBox {
      width:95%;
      height:90%;
      margin:20px auto;
      background:#fff;
      border-radius:10px;
      overflow:hidden;
    }

    #bonusBox header {
      background:#005bac;
      color:white;
      padding:10px;
      display:flex;
      justify-content:space-between;
    }

    #bonusBox iframe {
      width:100%;
      height:calc(100% - 50px);
      border:none;
    }

    #closeBtn {
      background:red;
      color:white;
      border:none;
      padding:5px 10px;
    }

    .edit-btn {
      background:#007bff;
      color:white;
      border:none;
      padding:4px;
    }
  </style>
</head>

<body>

<!-- 🔐 AUTH -->
<div id="authBox">
  <h2>Login</h2>

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button onclick="login()">Login</button>
  <button onclick="signup()">Sign Up</button>
</div>

<!-- 📊 APP -->
<div id="app">

<h2>📊 HC/PG SA Monthly Report</h2>

<button onclick="logout()">Logout</button>
<button onclick="openBonus()">💰 Bonus Calculator</button>

<input type="date" id="date">
<select id="store"></select>

<input type="number" id="total" placeholder="Total Apps">
<input type="number" id="signed" placeholder="Signed">
<input type="number" id="rejected" placeholder="Rejected">
<input type="number" id="cancelled" placeholder="Cancelled">

<select id="nonapps" disabled>
  <option value="">Non Apps</option>
  <option value="Yes">Yes</option>
  <option value="No">No</option>
</select>

<button onclick="addEntry()">➕ Add Entry</button>
<button onclick="saveAllToday()">💾 Save All</button>
<button onclick="updateEntry()">💾 Save Update</button>

<h3>📦 Preview</h3>
<table id="previewTable"></table>

<h3>📅 Daily Report</h3>
<input type="date" id="filterDate">
<button onclick="loadDayReport()">🔍 Load Day</button>

<h4 id="dayTitle"></h4>
<table id="dayReportTable"></table>

<h3>📊 Monthly Totals</h3>
<table id="monthlyTotals"></table>

</div>

<!-- BONUS -->
<div id="bonusModal">
  <div id="bonusBox">
    <header>
      <h3>💰 Bonus Calculator</h3>
      <button id="closeBtn" onclick="closeBonus()">Close</button>
    </header>
    <iframe src="https://yuilovemiyu.github.io/Bonus-Calculator/"></iframe>
  </div>
</div>

<script>

/////////////////////////////
// 🔥 FIREBASE (YOUR CONFIG)
/////////////////////////////
firebase.initializeApp({
  apiKey: "AIzaSyBoPZ6nioxI_fzVrdLSh-pQ_EEqSdPOnrY",
  authDomain: "pattern-for-reporting.firebaseapp.com",
  projectId: "pattern-for-reporting"
});

const auth = firebase.auth();
const db = firebase.firestore();

/////////////////////////////
// STORES
/////////////////////////////
const stores = [
  "Brookside","Manggahan","Bacoor","Dasmarinas","Gentri Jr.",
  "Tanza","Kawit","Tanza Paradahan","GMA","Tagaytay",
  "Molino","Paliparan","San Pedro","Pacita",
  "Binan Bayan","Crossing East","Anabu (Yssabelle)","Anabu (Ian)"
];

stores.forEach(s=>{
  let o=document.createElement("option");
  o.value=s;
  o.text=s;
  store.appendChild(o);
});

/////////////////////////////
// STATE
/////////////////////////////
let todayEntries=[];
let editingId=null;

/////////////////////////////
// AUTH FIXED
/////////////////////////////
function login(){
  auth.signInWithEmailAndPassword(email.value,password.value)
  .catch(e=>alert(e.message));
}

function signup(){
  auth.createUserWithEmailAndPassword(email.value,password.value)
  .catch(e=>alert(e.message));
}

function logout(){
  auth.signOut();
}

auth.onAuthStateChanged(user=>{
  if(user){
    authBox.style.display="none";
    app.style.display="block";
  } else {
    authBox.style.display="block";
    app.style.display="none";
  }
});

/////////////////////////////
// NON APPS
/////////////////////////////
total.addEventListener("input",()=>{
  nonapps.disabled = Number(total.value) > 1;
});

/////////////////////////////
// RESET
/////////////////////////////
function reset(){
  store.selectedIndex=0;
  total.value="";
  signed.value="";
  rejected.value="";
  cancelled.value="";
  nonapps.value="";
}

/////////////////////////////
// ADD
/////////////////////////////
function addEntry(){

  todayEntries.push({
    date:date.value,
    store:store.value,
    total:Number(total.value||0),
    signed:Number(signed.value||0),
    rejected:Number(rejected.value||0),
    cancelled:Number(cancelled.value||0),
    nonapps:nonapps.value||"-"
  });

  renderPreview();
  reset();
}

function renderPreview(){
  previewTable.innerHTML=`
  <tr>
    <th>Date</th><th>Store</th><th>Total</th>
  </tr>`;

  todayEntries.forEach(e=>{
    previewTable.innerHTML+=`
    <tr>
      <td>${e.date}</td>
      <td>${e.store}</td>
      <td>${e.total}</td>
    </tr>`;
  });
}

/////////////////////////////
// SAVE
/////////////////////////////
async function saveAllToday(){

  const batch=db.batch();

  todayEntries.forEach(e=>{
    batch.set(db.collection("reports").doc(),e);
  });

  await batch.commit();

  todayEntries=[];
  renderPreview();

  await recomputeMonthly();
}

/////////////////////////////
// MONTHLY FIXED
/////////////////////////////
async function recomputeMonthly(){

  const snap=await db.collection("reports").get();
  const map={};

  snap.forEach(doc=>{
    const d=doc.data();
    const m=d.date?.slice(0,7);
    const key=m+"_"+d.store;

    if(!map[key]){
      map[key]={month:m,store:d.store,total:0,signed:0,rejected:0,cancelled:0};
    }

    map[key].total+=d.total;
    map[key].signed+=d.signed;
    map[key].rejected+=d.rejected;
    map[key].cancelled+=d.cancelled;
  });

  const batch=db.batch();

  Object.values(map).forEach(t=>{
    batch.set(db.collection("monthly_totals").doc(t.month+"_"+t.store),t);
  });

  await batch.commit();
}

/////////////////////////////
// DAILY FIXED (REAL-TIME)
/////////////////////////////
function loadDayReport(){

  const day=filterDate.value;
  dayTitle.innerText="Daily: "+day;

  db.collection("reports")
  .where("date","==",day)
  .onSnapshot(snap=>{

    dayReportTable.innerHTML=`
    <tr>
      <th>Date</th><th>Store</th>
      <th>Total</th><th>Signed</th>
      <th>Rejected</th><th>Cancelled</th><th>Non Apps</th>
    </tr>`;

    snap.forEach(doc=>{
      const d=doc.data();

      dayReportTable.innerHTML+=`
      <tr>
        <td>${d.date}</td>
        <td>${d.store}</td>
        <td>${d.total}</td>
        <td>${d.signed}</td>
        <td>${d.rejected}</td>
        <td>${d.cancelled}</td>
        <td>${d.nonapps}</td>
      </tr>`;
    });

  });
}

/////////////////////////////
// BONUS
/////////////////////////////
function openBonus(){ bonusModal.style.display="block"; }
function closeBonus(){ bonusModal.style.display="none"; }

/////////////////////////////
// INIT FIX
/////////////////////////////
window.onload=()=>{
  date.value=new Date().toISOString().split("T")[0];
  filterDate.value=date.value;
};

</script>

</body>
</html>
