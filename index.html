<!DOCTYPE html>
<html>
<head>
  <title>HC/PG SA Monthly Report</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <style>
    body { font-family: Arial; padding: 15px; }

    input, select, button {
      margin: 5px;
      padding: 8px;
      width: 100%;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      margin-top: 10px;
    }

    th, td {
      border: 1px solid #000;
      padding: 6px;
      text-align: center;
      font-size: 12px;
    }

    #app { display:none; }
    #authBox { max-width:400px; margin:auto; }
  </style>
</head>

<body>

<!-- AUTH -->
<div id="authBox">
  <h2>Login</h2>

  <input id="username" placeholder="Username">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <h3>Signup Info</h3>

  <select id="signupStore"></select>

  <select id="restDay">
    <option value="">Rest Day</option>
    <option>Monday</option>
    <option>Tuesday</option>
    <option>Wednesday</option>
    <option>Thursday</option>
    <option>Friday</option>
    <option>Saturday</option>
    <option>Sunday</option>
  </select>

  <button onclick="signup()">Sign Up</button>
  <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app">

<h2>📊 Monthly Report</h2>

<div id="userInfo"></div>

<!-- 🔥 ADMIN TOOL (OPTION 2) -->
<div id="adminPanel" style="display:none; margin:10px 0;">
  <h3>🛠 Admin Tools</h3>
  <input id="adminEmail" placeholder="User email to promote">
  <button onclick="makeAdmin()">Make Admin</button>
</div>

<button onclick="logout()">Logout</button>

<input type="date" id="date">
<select id="store"></select>

<input type="number" id="total" placeholder="Total Apps">
<input type="number" id="signed" placeholder="Signed">
<input type="number" id="rejected" placeholder="Rejected">
<input type="number" id="cancelled" placeholder="Cancelled">

<select id="nonapps" disabled>
  <option value="">Non Apps</option>
  <option value="Yes">Yes</option>
  <option value="No">No</option>
</select>

<button onclick="addEntry()">➕ Add Entry</button>
<button onclick="saveAllToday()">💾 Save All</button>
<button onclick="updateEntry()">✏️ Update</button>

<h3>Preview</h3>
<table id="previewTable"></table>

<h3>Daily Report</h3>
<input type="date" id="filterDate">
<button onclick="loadDayReport()">Load Day</button>

<h4 id="dayTitle"></h4>
<table id="dayReportTable"></table>

<h3>Monthly Totals</h3>
<table id="monthlyTotals"></table>

</div>

<script>

firebase.initializeApp({
  apiKey: "AIzaSyADXlQJcV5KJXTfYBK5qscv7gd88-XNlKo",
  authDomain: "today-s-reporter-3dceb.firebaseapp.com",
  projectId: "today-s-reporter-3dceb"
});

const auth = firebase.auth();
const db = firebase.firestore();

/////////////////////////////
// STORES
/////////////////////////////
const stores = [
  "Brookside","Manggahan","Bacoor","Dasmarinas","Gentri Jr.",
  "Tanza","Kawit","Tanza Paradahan","GMA","Tagaytay",
  "Molino","Paliparan","San Pedro","Pacita",
  "Binan Bayan","Crossing East","Anabu (Yssabelle)","Anabu (Ian)","Rosario"
];

stores.forEach(s=>{
  signupStore.innerHTML += `<option value="${s}">${s}</option>`;
  store.innerHTML += `<option value="${s}">${s}</option>`;
});

/////////////////////////////
// USER DATA
/////////////////////////////
let currentUserData = null;

auth.onAuthStateChanged(async user=>{
  if(user){

    const snap = await db.collection("users").doc(user.uid).get();
    currentUserData = snap.data() || {};

    userInfo.innerHTML = `
      <b>User:</b> ${currentUserData.username || user.email} |
      <b>Store:</b> ${currentUserData.store || "N/A"} |
      <b>Rest Day:</b> ${currentUserData.restDay || "N/A"}
    `;

    // 🔥 SHOW ADMIN PANEL ONLY IF ADMIN
    if(currentUserData.admin){
      adminPanel.style.display = "block";
    }

    authBox.style.display="none";
    app.style.display="block";

  } else {
    authBox.style.display="block";
    app.style.display="none";
  }
});

/////////////////////////////
// SIGNUP
/////////////////////////////
function signup(){

  if(!signupStore.value || !restDay.value || !username.value){
    alert("Fill all fields");
    return;
  }

  auth.createUserWithEmailAndPassword(email.value,password.value)
  .then(async u=>{

    await db.collection("users").doc(u.user.uid).set({
      username: username.value,
      email: email.value,
      store: signupStore.value,
      restDay: restDay.value,
      admin: false
    });

    alert("Signup success");
  })
  .catch(e=>alert(e.message));
}

function login(){
  auth.signInWithEmailAndPassword(email.value,password.value)
  .catch(e=>alert(e.message));
}

function logout(){ auth.signOut(); }

/////////////////////////////
// 🔥 OPTION 2: MAKE ADMIN
/////////////////////////////
async function makeAdmin(){

  if(!currentUserData?.admin){
    return alert("No permission");
  }

  const emailToPromote = adminEmail.value;

  if(!emailToPromote){
    return alert("Enter email");
  }

  const snap = await db.collection("users")
    .where("email","==",emailToPromote)
    .get();

  if(snap.empty){
    return alert("User not found");
  }

  snap.forEach(doc=>{
    doc.ref.update({ admin: true });
  });

  alert("User promoted to admin");
}

/////////////////////////////
// DATA
/////////////////////////////
let todayEntries=[];
let editingId=null;

function addEntry(){

  todayEntries.push({
    date:date.value,
    store:store.value,
    total:+total.value||0,
    signed:+signed.value||0,
    rejected:+rejected.value||0,
    cancelled:+cancelled.value||0,
    nonapps:nonapps.value||"-",
    reportedBy: currentUserData?.store || "Unknown"
  });

  renderPreview();
}

function renderPreview(){

  previewTable.innerHTML=`
  <tr>
    <th>Date</th>
    <th>Store</th>
    <th>Total</th>
    <th>Reported By</th>
  </tr>`;

  todayEntries.forEach(e=>{
    previewTable.innerHTML+=`
    <tr>
      <td>${e.date}</td>
      <td>${e.store}</td>
      <td>${e.total}</td>
      <td>${e.reportedBy}</td>
    </tr>`;
  });
}

async function saveAllToday(){

  const batch=db.batch();

  todayEntries.forEach(e=>{
    batch.set(db.collection("reports").doc(),e);
  });

  await batch.commit();

  todayEntries=[];
  renderPreview();

  await recomputeMonthly();
}

async function recomputeMonthly(){

  const snap=await db.collection("reports").get();
  const map={};

  snap.forEach(doc=>{
    const d=doc.data();
    const m=d.date?.slice(0,7);
    if(!m) return;

    const key=m+"_"+d.store;

    if(!map[key]){
      map[key]={month:m,store:d.store,total:0,signed:0,rejected:0,cancelled:0};
    }

    map[key].total+=+d.total;
    map[key].signed+=+d.signed;
    map[key].rejected+=+d.rejected;
    map[key].cancelled+=+d.cancelled;
  });

  const batch=db.batch();

  Object.values(map).forEach(t=>{
    batch.set(db.collection("monthly_totals").doc(t.month+"_"+t.store),t);
  });

  await batch.commit();
}

function loadDayReport(){

  const day=filterDate.value;
  dayTitle.innerText="Daily: "+day;

  db.collection("reports")
  .where("date","==",day)
  .onSnapshot(snap=>{

    dayReportTable.innerHTML=`
    <tr>
      <th>Date</th>
      <th>Store</th>
      <th>Total</th>
      <th>Signed</th>
      <th>Rejected</th>
      <th>Cancelled</th>
      <th>Reported By</th>
    </tr>`;

    snap.forEach(doc=>{
      const d=doc.data();

      dayReportTable.innerHTML+=`
      <tr>
        <td>${d.date}</td>
        <td>${d.store}</td>
        <td>${d.total}</td>
        <td>${d.signed}</td>
        <td>${d.rejected}</td>
        <td>${d.cancelled}</td>
        <td>${d.reportedBy}</td>
      </tr>`;
    });

  });
}

function updateEntry(){

  db.collection("reports").doc(editingId).update({
    date:date.value,
    store:store.value,
    total:+total.value,
    signed:+signed.value,
    rejected:+rejected.value,
    cancelled:+cancelled.value,
    nonapps:nonapps.value
  }).then(()=>{
    recomputeMonthly();
    alert("Updated");
  });
}

window.onload=()=>{
  date.value=new Date().toISOString().split("T")[0];
  filterDate.value=date.value;
};

</script>

</body>
</html>
