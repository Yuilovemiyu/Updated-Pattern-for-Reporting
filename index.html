<!DOCTYPE html>
<html>
<head>
  <title>Daily Report</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <!-- PNG Generator -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <style>
    body { font-family: Arial; padding: 15px; }

    input, select, button {
      margin: 5px;
      padding: 8px;
      width: 100%;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      margin-top: 10px;
    }

    th, td {
      border: 1px solid #000;
      padding: 6px;
      text-align: center;
      font-size: 12px;
    }

    #startScreen {
      max-width: 400px;
      margin: auto;
      text-align: center;
    }

    #app { display:none; }
  </style>
</head>

<body>

<!-- STORE SELECT -->
<div id="startScreen">
  <h2>Select Your Store</h2>
  <select id="startStore"></select>
  <button onclick="startApp()">Enter</button>
</div>

<!-- MAIN APP -->
<div id="app">

<h2>📊 Daily Report</h2>
<div id="currentStore"></div>

<input type="date" id="date">
<select id="store"></select>

<input type="number" id="total" placeholder="Total Apps">
<input type="number" id="signed" placeholder="Signed">
<input type="number" id="rejected" placeholder="Rejected">
<input type="number" id="cancelled" placeholder="Cancelled">

<select id="nonapps" disabled>
  <option value="">Non Apps</option>
  <option>Yes</option>
  <option>No</option>
</select>

<button onclick="addEntry()">➕ Add Entry</button>
<button onclick="saveAsPNG()">🖼 Save PNG</button>
<button onclick="updateEntry()">✏️ Update</button>

<!-- PREVIEW -->
<h3>Preview Entries</h3>
<table id="previewTable"></table>

<h3>Daily Report</h3>
<input type="date" id="filterDate">
<button onclick="loadDayReport()">Load Day</button>

<h4 id="dayTitle"></h4>
<table id="dayReportTable"></table>

</div>

<!-- HIDDEN PNG AREA -->
<div id="pngCapture" style="display:none; background:white; padding:10px;"></div>

<script>

// FIREBASE INIT
firebase.initializeApp({
  apiKey: "AIzaSyADXlQJcV5KJXTfYBK5qscv7gd88-XNlKo",
  authDomain: "today-s-reporter-3dceb.firebaseapp.com",
  projectId: "today-s-reporter-3dceb"
});

const db = firebase.firestore();

// STORES
const stores = [
  "Brookside","Manggahan","Bacoor","Dasmarinas","Gentri Jr.",
  "Tanza","Kawit","Tanza Paradahan","GMA","Tagaytay",
  "Molino","Paliparan","San Pedro","Pacita",
  "Binan Bayan","Crossing East","Anabu (Yssabelle)","Anabu (Ian)","Rosario"
];

const store = document.getElementById("store");
const startStore = document.getElementById("startStore");

stores.forEach(s=>{
  store.innerHTML += `<option value="${s}">${s}</option>`;
  startStore.innerHTML += `<option value="${s}">${s}</option>`;
});

// VARIABLES
let todayEntries = [];
let editingId = null;
let selectedStore = null;

// START APP
function startApp(){
  selectedStore = startStore.value;
  if(!selectedStore) return alert("Select store");

  localStorage.setItem("selectedStore", selectedStore);

  startScreen.style.display="none";
  app.style.display="block";

  currentStore.innerHTML = `<b>Store:</b> ${selectedStore}`;
}

// AUTO LOAD STORE
window.onload = ()=>{
  const saved = localStorage.getItem("selectedStore");
  if(saved){
    startStore.value = saved;
    startApp();
  }

  date.valueAsDate = new Date();
  renderPreview();
};

// NON APPS LOGIC
total.oninput = ()=> nonapps.disabled = total.value > 1;

// ✅ UPDATED ADD ENTRY
function addEntry(){
  todayEntries.push({
    date: date.value,
    store: store.value,
    total: +total.value || 0,
    signed: +signed.value || 0,
    rejected: +rejected.value || 0,
    cancelled: +cancelled.value || 0,
    nonapps: nonapps.value || "-",
    reportedBy: selectedStore
  });

  renderPreview();

  // CLEAR FIELDS (except date)
  store.selectedIndex = 0;
  total.value = "";
  signed.value = "";
  rejected.value = "";
  cancelled.value = "";
  nonapps.value = "";
  nonapps.disabled = true;
}

// PREVIEW RENDER
function renderPreview(){

  previewTable.innerHTML = `
    <tr>
      <th>Date</th>
      <th>Store</th>
      <th>Total</th>
      <th>Signed</th>
      <th>Rejected</th>
      <th>Cancelled</th>
      <th>Non Apps</th>
    </tr>
  `;

  if(todayEntries.length === 0){
    previewTable.innerHTML += `<tr><td colspan="7">No entries yet</td></tr>`;
    return;
  }

  todayEntries.forEach(e=>{
    previewTable.innerHTML += `
      <tr>
        <td>${e.date}</td>
        <td>${e.store}</td>
        <td>${e.total}</td>
        <td>${e.signed}</td>
        <td>${e.rejected}</td>
        <td>${e.cancelled}</td>
        <td>${e.nonapps}</td>
      </tr>
    `;
  });
}

// SAVE + PNG
async function saveAsPNG(){

  if(todayEntries.length === 0){
    alert("No entries to save");
    return;
  }

  const batch = db.batch();
  todayEntries.forEach(e=>{
    batch.set(db.collection("reports").doc(), e);
  });

  await batch.commit();
  await recomputeMonthly();

  const box = document.getElementById("pngCapture");
  box.style.display = "block";

  let html = `
    <h3>Daily Report</h3>
    <p><b>Date:</b> ${date.value}</p>
    <p><b>Store:</b> ${selectedStore}</p>

    <table border="1" style="border-collapse:collapse;width:100%">
      <tr>
        <th>Store</th>
        <th>Total</th>
        <th>Signed</th>
        <th>Rejected</th>
        <th>Cancelled</th>
        <th>Non Apps</th>
      </tr>
  `;

  todayEntries.forEach(e=>{
    html += `
      <tr>
        <td>${e.store}</td>
        <td>${e.total}</td>
        <td>${e.signed}</td>
        <td>${e.rejected}</td>
        <td>${e.cancelled}</td>
        <td>${e.nonapps}</td>
      </tr>
    `;
  });

  html += `</table>`;
  box.innerHTML = html;

  const canvas = await html2canvas(box);
  const link = document.createElement("a");

  link.download = `Daily_Report_${date.value}.png`;
  link.href = canvas.toDataURL();
  link.click();

  box.style.display = "none";
  box.innerHTML = "";
  todayEntries = [];

  renderPreview();

  alert("✅ Saved to Firebase + PNG downloaded!");
}

// RECOMPUTE MONTHLY
async function recomputeMonthly(){

  const snap = await db.collection("reports").get();
  const map = {};

  snap.forEach(doc=>{
    const d = doc.data();
    const m = d.date?.slice(0,7);
    if(!m) return;

    const key = m+"_"+d.store;

    if(!map[key]){
      map[key] = {month:m,store:d.store,total:0,signed:0,rejected:0,cancelled:0};
    }

    map[key].total += +d.total;
    map[key].signed += +d.signed;
    map[key].rejected += +d.rejected;
    map[key].cancelled += +d.cancelled;
  });

  const batch = db.batch();
  Object.values(map).forEach(t=>{
    batch.set(db.collection("monthly_totals").doc(t.month+"_"+t.store), t);
  });

  await batch.commit();
}

// DAILY VIEW
function loadDayReport(){

  const day = filterDate.value;
  dayTitle.innerText = "Daily: " + day;

  db.collection("reports")
    .where("date","==",day)
    .onSnapshot(snap=>{

      dayReportTable.innerHTML = `
        <tr>
          <th>Date</th><th>Store</th>
          <th>Total</th><th>Signed</th>
          <th>Rejected</th><th>Cancelled</th><th>Non Apps</th><th>Action</th>
        </tr>
      `;

      snap.forEach(doc=>{
        const d = doc.data();

        dayReportTable.innerHTML += `
          <tr>
            <td>${d.date}</td>
            <td>${d.store}</td>
            <td>${d.total}</td>
            <td>${d.signed}</td>
            <td>${d.rejected}</td>
            <td>${d.cancelled}</td>
            <td>${d.nonapps}</td>
            <td><button onclick='editEntry("${doc.id}", ${JSON.stringify(d)})'>Edit</button></td>
          </tr>
        `;
      });
    });
}

// EDIT
function editEntry(id,data){
  date.value = data.date;
  store.value = data.store;
  total.value = data.total;
  signed.value = data.signed;
  rejected.value = data.rejected;
  cancelled.value = data.cancelled;
  nonapps.value = data.nonapps;
  editingId = id;
}

// UPDATE
async function updateEntry(){
  await db.collection("reports").doc(editingId).update({
    date: date.value,
    store: store.value,
    total: Number(total.value),
    signed: Number(signed.value),
    rejected: Number(rejected.value),
    cancelled: Number(cancelled.value),
    nonapps: nonapps.value
  });

  await recomputeMonthly();
  alert("Updated");
}

</script>

</body>
</html>
