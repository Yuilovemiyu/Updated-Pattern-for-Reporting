<!DOCTYPE html>
<html>
<head>
  <title>HC/PG SA Monthly Report</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <style>
    body { font-family: Arial; padding: 15px; }
    input, select, button { margin: 5px; padding: 8px; width: 100%; }
    table { border-collapse: collapse; width: 100%; margin-top: 10px; }
    th, td { border: 1px solid #000; padding: 6px; text-align: center; font-size: 12px; }
    .edit-btn { background: #007bff; color: white; border: none; padding: 4px 6px; cursor: pointer; }
    .delete-btn { background: red; color: white; border: none; padding: 4px 6px; cursor: pointer; }
  </style>
</head>

<body>

<h2>📊 HC/PG SA Monthly Report</h2>

<input type="date" id="date">
<select id="store"></select>

<input type="number" id="total" placeholder="Total Apps">
<input type="number" id="signed" placeholder="Signed">
<input type="number" id="rejected" placeholder="Rejected">
<input type="number" id="cancelled" placeholder="Cancelled">

<select id="nonapps" disabled>
  <option value="">Non Apps</option>
  <option value="Yes">Yes</option>
  <option value="No">No</option>
</select>

<button onclick="addEntry()">➕ Add Entry</button>
<button onclick="saveAllToday()">💾 Save All</button>
<button onclick="updateEntry()">💾 Update</button>

<h3>📦 Preview</h3>
<table id="previewTable"></table>

<h3>📅 Daily Report</h3>
<input type="date" id="filterDate">
<table id="dayReportTable"></table>

<h3>📊 Monthly Totals</h3>
<table id="monthlyTotals"></table>

<script>

// 🔥 FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyBoPZ6nioxI_fzVrdLSh-pQ_EEqSdPOnrY",
  authDomain: "pattern-for-reporting.firebaseapp.com",
  projectId: "pattern-for-reporting"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// STORES
const stores = ["Brookside","Manggahan","Bacoor","Dasmarinas","Gentri Jr.",
"Tanza","Kawit","Tanza Paradahan","GMA","Tagaytay","Molino","Paliparan",
"San Pedro","Pacita","Binan Bayan","Crossing East","Anabu (Yssabelle)","Anabu (Ian)","Rosario"];

stores.forEach(s=>{
  let o=document.createElement("option");
  o.value=s; o.text=s;
  store.appendChild(o);
});

// INIT
date.value = new Date().toISOString().split("T")[0];
filterDate.value = date.value;

let todayEntries = [];
let editingId = null;
let unsubscribeDay = null;
let unsubscribeMonthly = null;

// NON APPS LOGIC
total.addEventListener("input",()=>{
  nonapps.disabled = Number(total.value) > 1;
});

// RESET FORM
function reset(){
  store.selectedIndex = 0;
  total.value = signed.value = rejected.value = cancelled.value = "";
  nonapps.value = "";
}

// SAFE NUMBER
function safeNum(val){
  const n = parseFloat(val);
  return isNaN(n) ? 0 : n;
}

// ADD ENTRY (PREVIEW ONLY)
function addEntry(){
  todayEntries.push({
    date: date.value,
    store: store.value,
    total: safeNum(total.value),
    signed: safeNum(signed.value),
    rejected: safeNum(rejected.value),
    cancelled: safeNum(cancelled.value),
    nonapps: nonapps.value || "-"
  });
  renderPreview();
  reset();
}

// PREVIEW TABLE
function renderPreview(){
  previewTable.innerHTML = `
  <tr><th>Date</th><th>Store</th><th>Total</th><th>Signed</th>
  <th>Rejected</th><th>Cancelled</th><th>Non Apps</th></tr>`;

  todayEntries.forEach(e=>{
    previewTable.innerHTML += `
    <tr>
      <td>${e.date}</td><td>${e.store}</td><td>${e.total}</td>
      <td>${e.signed}</td><td>${e.rejected}</td>
      <td>${e.cancelled}</td><td>${e.nonapps}</td>
    </tr>`;
  });
}

// SAVE ALL
async function saveAllToday(){
  if(todayEntries.length===0) return alert("No data");

  const batch = db.batch();

  todayEntries.forEach(e=>{
    const id = `${e.date}_${e.store}`;
    batch.set(db.collection("reports").doc(id), e);
  });

  await batch.commit();
  todayEntries=[];
  renderPreview();

  await recomputeMonthly();

  alert("Saved!");
}

// RECOMPUTE MONTHLY
async function recomputeMonthly(){

  const reports = await db.collection("reports").get();

  const old = await db.collection("monthly_totals").get();
  const delBatch = db.batch();
  old.forEach(doc=>delBatch.delete(doc.ref));
  await delBatch.commit();

  const map={};

  reports.forEach(doc=>{
    const d=doc.data();

    if(!d.date || d.date.length<7) return;

    const month=d.date.substring(0,7);
    const key=`${month}_${d.store}`;

    if(!map[key]){
      map[key]={month,store:d.store,total:0,signed:0,rejected:0,cancelled:0};
    }

    map[key].total += safeNum(d.total);
    map[key].signed += safeNum(d.signed);
    map[key].rejected += safeNum(d.rejected);
    map[key].cancelled += safeNum(d.cancelled);
  });

  const batch=db.batch();
  Object.values(map).forEach(t=>{
    batch.set(db.collection("monthly_totals").doc(`${t.month}_${t.store}`), t);
  });

  await batch.commit();
}

// REAL-TIME DAILY
function loadDayReport(){

  if(unsubscribeDay) unsubscribeDay();

  unsubscribeDay = db.collection("reports")
  .where("date","==",filterDate.value)
  .onSnapshot(snap=>{

    dayReportTable.innerHTML = `
    <tr>
      <th>Date</th><th>Store</th><th>Total</th>
      <th>Signed</th><th>Rejected</th>
      <th>Cancelled</th><th>Non Apps</th><th>Action</th>
    </tr>`;

    snap.forEach(doc=>{
      const d = doc.data();
      const id = doc.id;

      dayReportTable.innerHTML += `
      <tr>
        <td>${d.date}</td>
        <td>${d.store}</td>
        <td>${d.total}</td>
        <td>${d.signed}</td>
        <td>${d.rejected}</td>
        <td>${d.cancelled}</td>
        <td>${d.nonapps}</td>
        <td>
          <button class="edit-btn" onclick="editEntry('${id}')">✏️</button>
          <button class="delete-btn" onclick="deleteEntry('${id}')">🗑️</button>
        </td>
      </tr>`;
    });
  });
}

// REAL-TIME MONTHLY
function loadMonthlyTotals(){

  if(unsubscribeMonthly) unsubscribeMonthly();

  unsubscribeMonthly = db.collection("monthly_totals")
  .onSnapshot(snapshot=>{

    monthlyTotals.innerHTML = `
    <tr><th>Month</th><th>Store</th><th>Total</th>
    <th>Signed</th><th>Rejected</th><th>Cancelled</th></tr>`;

    let grouped={};

    snapshot.forEach(doc=>{
      const d=doc.data();
      if(!grouped[d.month]) grouped[d.month]=[];
      grouped[d.month].push(d);
    });

    Object.keys(grouped).sort().forEach(month=>{

      let t=0,s=0,r=0,c=0;

      monthlyTotals.innerHTML += `
      <tr style="background:#ddd;font-weight:bold">
        <td colspan="6">${month}</td>
      </tr>`;

      grouped[month].forEach(d=>{
        t+=d.total||0;
        s+=d.signed||0;
        r+=d.rejected||0;
        c+=d.cancelled||0;

        monthlyTotals.innerHTML += `
        <tr>
          <td>${d.month}</td><td>${d.store}</td>
          <td>${d.total}</td><td>${d.signed}</td>
          <td>${d.rejected}</td><td>${d.cancelled}</td>
        </tr>`;
      });

      monthlyTotals.innerHTML += `
      <tr style="font-weight:bold;background:#f2f2f2">
        <td colspan="2">${month} TOTAL</td>
        <td>${t}</td><td>${s}</td><td>${r}</td><td>${c}</td>
      </tr>`;
    });
  });
}

// EDIT
function editEntry(id){
  db.collection("reports").doc(id).get().then(doc=>{
    const d = doc.data();

    date.value = d.date;
    store.value = d.store;
    total.value = d.total;
    signed.value = d.signed;
    rejected.value = d.rejected;
    cancelled.value = d.cancelled;
    nonapps.value = d.nonapps;

    editingId = id;
    window.scrollTo({ top: 0, behavior: "smooth" });
  });
}

// UPDATE
async function updateEntry(){
  if(!editingId) return alert("Select record first");

  await db.collection("reports").doc(editingId).set({
    date: date.value,
    store: store.value,
    total: safeNum(total.value),
    signed: safeNum(signed.value),
    rejected: safeNum(rejected.value),
    cancelled: safeNum(cancelled.value),
    nonapps: nonapps.value || "-"
  });

  editingId=null;

  await recomputeMonthly();
  reset();

  alert("Updated!");
}

// DELETE
async function deleteEntry(id){
  if(!confirm("Delete this entry?")) return;

  await db.collection("reports").doc(id).delete();

  await recomputeMonthly();

  alert("Deleted!");
}

// AUTO LOAD
filterDate.addEventListener("change", loadDayReport);

window.onload = ()=>{
  loadDayReport();
  loadMonthlyTotals();
};

</script>
</body>
</html>
