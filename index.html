<!DOCTYPE html>
<html>
<head>
  <title>HC/PG SA Monthly Report</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

  <style>
    body { font-family: Arial; padding: 15px; }
    input, select, button { margin: 5px; padding: 8px; width: 100%; }
    table { border-collapse: collapse; width: 100%; margin-top: 10px; }
    th, td { border: 1px solid #000; padding: 6px; text-align: center; font-size: 12px; }
    .edit-btn { background: #007bff; color: white; border: none; padding: 4px 6px; cursor: pointer; }
  </style>
</head>

<body>

<h2>📊 HC/PG SA Monthly Report</h2>

<input type="date" id="date">
<select id="store"></select>

<input type="number" id="total" placeholder="Total Apps">
<input type="number" id="signed" placeholder="Signed">
<input type="number" id="rejected" placeholder="Rejected">
<input type="number" id="cancelled" placeholder="Cancelled">

<select id="nonapps" disabled>
  <option value="">Non Apps</option>
  <option value="Yes">Yes</option>
  <option value="No">No</option>
</select>

<button onclick="addEntry()">➕ Add Entry</button>
<button onclick="saveAllToday()">💾 Save All</button>
<button onclick="updateEntry()">💾 Save Update</button>

<h3>📦 Preview</h3>
<table id="previewTable"></table>

<h3>📅 Daily Report</h3>
<input type="date" id="filterDate">
<button onclick="loadDayReport()">🔍 Load Day</button>

<table id="dayReportTable"></table>

<h3>📊 Monthly Totals</h3>
<table id="monthlyTotals"></table>

<script>

// FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyBoPZ6nioxI_fzVrdLSh-pQ_EEqSdPOnrY",
  authDomain: "pattern-for-reporting.firebaseapp.com",
  projectId: "pattern-for-reporting"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// STORES
const stores = ["Brookside","Manggahan","Bacoor","Dasmarinas","Gentri Jr.",
"Tanza","Kawit","Tanza Paradahan","GMA","Tagaytay","Molino","Paliparan",
"San Pedro","Pacita","Binan Bayan","Crossing East","Anabu (Yssabelle)","Anabu (Ian)","Rosario"];

stores.forEach(s=>{
  let o=document.createElement("option");
  o.value=s; o.text=s;
  store.appendChild(o);
});

// INIT
date.value = new Date().toISOString().split("T")[0];
filterDate.value = date.value;

let todayEntries = [];
let editingId = null;

// NON APPS
total.addEventListener("input",()=>{
  nonapps.disabled = Number(total.value) > 1;
});

// RESET
function reset(){
  store.selectedIndex = 0;
  total.value = signed.value = rejected.value = cancelled.value = "";
  nonapps.value = "";
}

// ADD ENTRY
function addEntry(){
  todayEntries.push({
    date: date.value,
    store: store.value,
    total: Number(total.value||0),
    signed: Number(signed.value||0),
    rejected: Number(rejected.value||0),
    cancelled: Number(cancelled.value||0),
    nonapps: nonapps.value || "-"
  });
  renderPreview();
  reset();
}

// PREVIEW
function renderPreview(){
  previewTable.innerHTML = `
  <tr><th>Date</th><th>Store</th><th>Total</th><th>Signed</th>
  <th>Rejected</th><th>Cancelled</th><th>Non Apps</th></tr>`;

  todayEntries.forEach(e=>{
    previewTable.innerHTML += `
    <tr>
      <td>${e.date}</td><td>${e.store}</td><td>${e.total}</td>
      <td>${e.signed}</td><td>${e.rejected}</td>
      <td>${e.cancelled}</td><td>${e.nonapps}</td>
    </tr>`;
  });
}

// SAVE (FIXED: NO DUPLICATES)
async function saveAllToday(){
  if(todayEntries.length===0) return alert("No data");

  const batch = db.batch();

  todayEntries.forEach(e=>{
    const docId = e.date + "_" + e.store; // ✅ KEY FIX
    batch.set(db.collection("reports").doc(docId), e);
  });

  await batch.commit();

  todayEntries=[];
  renderPreview();

  await recomputeMonthly();
  loadMonthlyTotals();

  alert("Saved!");
}

// RECOMPUTE MONTHLY (CLEAN)
async function recomputeMonthly(){

  const reports = await db.collection("reports").get();

  // CLEAR OLD
  const old = await db.collection("monthly_totals").get();
  const delBatch = db.batch();
  old.forEach(doc=>delBatch.delete(doc.ref));
  await delBatch.commit();

  const map={};

  reports.forEach(doc=>{
    const d=doc.data();
    const month=d.date?.substring(0,7);
    if(!month) return;

    const key=month+"_"+d.store;

    if(!map[key]){
      map[key]={month,store:d.store,total:0,signed:0,rejected:0,cancelled:0};
    }

    map[key].total += Number(d.total||0);
    map[key].signed += Number(d.signed||0);
    map[key].rejected += Number(d.rejected||0);
    map[key].cancelled += Number(d.cancelled||0);
  });

  const batch=db.batch();
  Object.values(map).forEach(t=>{
    batch.set(db.collection("monthly_totals").doc(t.month+"_"+t.store), t);
  });

  await batch.commit();
}

// LOAD MONTHLY (FIXED NUMBERS)
function loadMonthlyTotals(){

  db.collection("monthly_totals").get().then(snapshot=>{

    monthlyTotals.innerHTML = `
    <tr><th>Month</th><th>Store</th><th>Total</th>
    <th>Signed</th><th>Rejected</th><th>Cancelled</th></tr>`;

    let grouped={};

    snapshot.forEach(doc=>{
      const d=doc.data();
      if(!grouped[d.month]) grouped[d.month]=[];
      grouped[d.month].push(d);
    });

    Object.keys(grouped).sort().forEach(month=>{

      let t=0,s=0,r=0,c=0;

      monthlyTotals.innerHTML += `
      <tr style="background:#ddd;font-weight:bold">
        <td colspan="6">${month}</td>
      </tr>`;

      grouped[month].forEach(d=>{
        t+=Number(d.total||0);
        s+=Number(d.signed||0);
        r+=Number(d.rejected||0);
        c+=Number(d.cancelled||0);

        monthlyTotals.innerHTML += `
        <tr>
          <td>${d.month}</td><td>${d.store}</td>
          <td>${d.total}</td><td>${d.signed}</td>
          <td>${d.rejected}</td><td>${d.cancelled}</td>
        </tr>`;
      });

      monthlyTotals.innerHTML += `
      <tr style="font-weight:bold;background:#f2f2f2">
        <td colspan="2">${month} TOTAL</td>
        <td>${t}</td><td>${s}</td><td>${r}</td><td>${c}</td>
      </tr>`;
    });
  });
}

// DAILY (FIXED SNAPSHOT BUG)
function loadDayReport(){

  db.collection("reports")
  .where("date","==",filterDate.value)
  .get()
  .then(snap=>{

    dayReportTable.innerHTML = `
    <tr><th>Date</th><th>Store</th><th>Total</th>
    <th>Signed</th><th>Rejected</th><th>Cancelled</th><th>Non Apps</th></tr>`;

    snap.forEach(doc=>{
      const d=doc.data();

      dayReportTable.innerHTML += `
      <tr>
        <td>${d.date}</td><td>${d.store}</td>
        <td>${d.total}</td><td>${d.signed}</td>
        <td>${d.rejected}</td><td>${d.cancelled}</td>
        <td>${d.nonapps}</td>
      </tr>`;
    });
  });
}

// UPDATE
async function updateEntry(){

  const docId = date.value + "_" + store.value;

  await db.collection("reports").doc(docId).set({
    date: date.value,
    store: store.value,
    total: Number(total.value),
    signed: Number(signed.value),
    rejected: Number(rejected.value),
    cancelled: Number(cancelled.value),
    nonapps: nonapps.value
  });

  await recomputeMonthly();
  loadMonthlyTotals();

  alert("Updated");
}

// INIT
window.onload = ()=>{
  loadMonthlyTotals();
};

</script>
</body>
</html>
