<!DOCTYPE html>
<html>
<head>
  <title>HC/PG SA Monthly Report</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="manifest" href="manifest.json">

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

  <style>
    body { font-family: Arial; padding: 15px; }
    input, select, button { margin: 5px; padding: 8px; width: 100%; }
    table { border-collapse: collapse; width: 100%; margin-top: 10px; }
    th, td { border: 1px solid #000; padding: 6px; text-align: center; font-size: 12px; }
    .edit-btn { background:#007bff; color:white; border:none; padding:4px; }
    .delete-btn { background:red; color:white; border:none; padding:4px; }
  </style>
</head>

<body>

<!-- AUTH -->
<div id="authBox">
  <h3>🔐 Login</h3>
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">

  <button onclick="login()">Login</button>
  <button onclick="signup()">Sign Up</button>

  <div id="profileSetup" style="display:none;">
    <h4>👤 Setup Profile</h4>

    <select id="userStore"></select>

    <label>Rest Days</label>
    <select id="restDays" multiple>
      <option>Sunday</option>
      <option>Monday</option>
      <option>Tuesday</option>
      <option>Wednesday</option>
      <option>Thursday</option>
      <option>Friday</option>
      <option>Saturday</option>
    </select>

    <select id="userRole">
      <option value="staff">Staff</option>
      <option value="admin">Admin</option>
    </select>

    <button onclick="saveProfile()">Save Profile</button>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<button onclick="logout()">🚪 Logout</button>

<h2>📊 Report System</h2>

<input type="date" id="date">
<input type="date" id="filterDate">

<select id="store"></select>

<input type="number" id="total" placeholder="Total">
<input type="number" id="signed" placeholder="Signed">
<input type="number" id="rejected" placeholder="Rejected">
<input type="number" id="cancelled" placeholder="Cancelled">

<select id="nonapps">
  <option value="">Non Apps</option>
  <option>Yes</option>
  <option>No</option>
</select>

<button onclick="addEntry()">➕ Add</button>
<button onclick="saveAllToday()">💾 Save</button>
<button onclick="updateEntry()">✏️ Update</button>

<h3>Preview</h3>
<table id="previewTable"></table>

<h3>Daily Report</h3>
<table id="dayReportTable"></table>

<h3>Monthly Totals</h3>
<table id="monthlyTotals"></table>

</div>

<script>

/////////////////////////////
// 🔥 FIREBASE (INSERTED)
/////////////////////////////
firebase.initializeApp({
  apiKey: "AIzaSyADXlQJcV5KJXTfYBK5qscv7gd88-XNlKo",
  authDomain: "today-s-reporter-3dceb.firebaseapp.com",
  projectId: "today-s-reporter-3dceb"
});

const db = firebase.firestore();
const auth = firebase.auth();

/////////////////////////////
// STORES
/////////////////////////////
const stores = ["Brookside","Manggahan","Bacoor","Dasmarinas","Gentri Jr.",
"Tanza","Kawit","Tanza Paradahan","GMA","Tagaytay","Molino","Paliparan",
"San Pedro","Pacita","Binan Bayan","Crossing East","Anabu (Yssabelle)","Anabu (Ian)","Rosario"];

stores.forEach(s=>{
  userStore.innerHTML += `<option>${s}</option>`;
  store.innerHTML += `<option>${s}</option>`;
});

/////////////////////////////
// STATE
/////////////////////////////
let profile=null;
let isAdmin=false;
let editingId=null;
let unsubDay=null;
let unsubMonth=null;
let todayEntries=[];

const safe = v => isNaN(parseFloat(v)) ? 0 : parseFloat(v);

/////////////////////////////
// AUTH
/////////////////////////////
function login(){
  auth.signInWithEmailAndPassword(email.value,password.value);
}

function signup(){
  auth.createUserWithEmailAndPassword(email.value,password.value)
  .then(()=>profileSetup.style.display="block");
}

function logout(){
  auth.signOut();
}

/////////////////////////////
// SAVE PROFILE
/////////////////////////////
async function saveProfile(){

  const user=auth.currentUser;
  const rest=[...restDays.selectedOptions].map(o=>o.value);

  await db.collection("users").doc(user.uid).set({
    email:user.email,
    store:userStore.value,
    restDays:rest,
    role:userRole.value
  });

  profileSetup.style.display="none";
}

/////////////////////////////
// AUTH STATE
/////////////////////////////
auth.onAuthStateChanged(async user=>{
  if(!user){
    authBox.style.display="block";
    app.style.display="none";
    return;
  }

  const doc=await db.collection("users").doc(user.uid).get();

  if(!doc.exists){
    profileSetup.style.display="block";
    return;
  }

  profile=doc.data();
  isAdmin=profile.role==="admin";

  store.value=profile.store;
  store.disabled=!isAdmin;

  authBox.style.display="none";
  app.style.display="block";

  loadDay();
  loadMonth();
});

/////////////////////////////
// ADD ENTRY
/////////////////////////////
function addEntry(){
  todayEntries.push({
    date:date.value,
    store:profile.store,
    total:safe(total.value),
    signed:safe(signed.value),
    rejected:safe(rejected.value),
    cancelled:safe(cancelled.value),
    nonapps:nonapps.value||"-",
    user:auth.currentUser.email
  });

  render();
}

function render(){
  previewTable.innerHTML="<tr><th>Date</th><th>Store</th><th>Total</th></tr>";
  todayEntries.forEach(e=>{
    previewTable.innerHTML+=`
    <tr><td>${e.date}</td><td>${e.store}</td><td>${e.total}</td></tr>`;
  });
}

/////////////////////////////
// SAVE ALL
/////////////////////////////
async function saveAllToday(){
  const batch=db.batch();

  todayEntries.forEach(e=>{
    const id=`${e.date}_${e.store}`;
    batch.set(db.collection("reports").doc(id),e);
  });

  await batch.commit();
  todayEntries=[];
  render();
  recompute();
}

/////////////////////////////
// UPDATE
/////////////////////////////
async function updateEntry(){
  if(!editingId) return;

  await db.collection("reports").doc(editingId).set({
    date:date.value,
    store:profile.store,
    total:safe(total.value),
    signed:safe(signed.value),
    rejected:safe(rejected.value),
    cancelled:safe(cancelled.value),
    nonapps:nonapps.value
  });

  editingId=null;
  recompute();
}

/////////////////////////////
// DELETE
/////////////////////////////
async function del(id){
  await db.collection("reports").doc(id).delete();
  recompute();
}

/////////////////////////////
// REALTIME DAILY (ADMIN LOGIC)
/////////////////////////////
function loadDay(){

  if(unsubDay) unsubDay();

  let q=db.collection("reports")
  .where("date","==",filterDate.value);

  if(!isAdmin){
    q=q.where("store","==",profile.store);
  }

  unsubDay=q.onSnapshot(s=>{
    dayReportTable.innerHTML="";

    s.forEach(d=>{
      const x=d.data();

      dayReportTable.innerHTML+=`
      <tr>
        <td>${x.store}</td>
        <td>${x.total}</td>
        <td>
          ${isAdmin ? `<button onclick="del('${d.id}')">X</button>` : ""}
        </td>
      </tr>`;
    });
  });
}

/////////////////////////////
// MONTHLY REALTIME
/////////////////////////////
function loadMonth(){

  if(unsubMonth) unsubMonth();

  unsubMonth=db.collection("monthly_totals")
  .onSnapshot(s=>{
    monthlyTotals.innerHTML="";

    s.forEach(d=>{
      const x=d.data();
      monthlyTotals.innerHTML+=`
      <tr><td>${x.month}</td><td>${x.store}</td><td>${x.total}</td></tr>`;
    });
  });
}

/////////////////////////////
// RECOMPUTE
/////////////////////////////
async function recompute(){

  const snap=await db.collection("reports").get();
  const map={};

  snap.forEach(d=>{
    const x=d.data();
    const m=x.date?.slice(0,7);
    const k=m+"_"+x.store;

    if(!map[k]) map[k]={month:m,store:x.store,total:0};

    map[k].total+=x.total||0;
  });

  const batch=db.batch();

  Object.values(map).forEach(v=>{
    batch.set(db.collection("monthly_totals").doc(v.month+"_"+v.store),v);
  });

  await batch.commit();
}

/////////////////////////////
// INIT
/////////////////////////////
date.value=filterDate.value=new Date().toISOString().split("T")[0];

</script>

</body>
</html>
