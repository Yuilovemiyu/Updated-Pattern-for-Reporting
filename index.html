<!DOCTYPE html>
<html>
<head>
  <title>HC/PG SA Monthly Report</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <style>
    body { font-family: Arial; padding: 15px; }
    input, select, button { margin: 5px; padding: 8px; width: 100%; }
    table { border-collapse: collapse; margin-top: 20px; width: 100%; }
    th, td { border: 1px solid black; padding: 6px; text-align: center; font-size: 12px; }

    .delete-btn {
      background: #dc3545;
      color: white;
      border: none;
      padding: 4px 6px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h2>📊 HC/PG SA Monthly Report (FINAL SYSTEM)</h2>

<input type="date" id="date">

<select id="store"></select>

<select id="override">
  <option value="">Auto Status</option>
  <option>Present</option>
  <option>Absent</option>
  <option>On Leave</option>
</select>

<input type="number" id="total" placeholder="Total Apps">
<input type="number" id="signed" placeholder="Signed">
<input type="number" id="rejected" placeholder="Rejected">
<input type="number" id="cancelled" placeholder="Cancelled">

<select id="nonapps" disabled>
  <option value="">Non Apps</option>
  <option value="Yes">Yes</option>
  <option value="No">No</option>
</select>

<button onclick="addEntry()">➕ Add Entry</button>
<button onclick="saveAllToday()">💾 Save All (Today)</button>
<button onclick="loadPreviousData()">📂 View Previous Data</button>

<h3>📦 Today's Entries</h3>
<table id="previewTable"></table>

<h3>📋 Full Report</h3>
<table id="report"></table>

<h3>📅 Monthly Totals</h3>
<table id="monthlyTotals"></table>

<script>

// ================= FIREBASE =================
const firebaseConfig = {
  apiKey: "AIzaSyBoPZ6nioxI_fzVrdLSh-pQ_EEqSdPOnrY",
  authDomain: "pattern-for-reporting.firebaseapp.com",
  projectId: "pattern-for-reporting"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ================= STORE LIST =================
const stores = [
  {name:"Brookside", rest:"Monday"},
  {name:"Manggahan", rest:"Monday"},
  {name:"Bacoor", rest:"Tuesday"},
  {name:"Dasmarinas", rest:"Tuesday"},
  {name:"Gentri Jr.", rest:"Thursday"},
  {name:"Tanza", rest:"Monday"},
  {name:"Kawit", rest:"Tuesday"},
  {name:"Tanza Paradahan", rest:"Tuesday"},
  {name:"GMA", rest:"Tuesday"},
  {name:"Tagaytay", rest:"Tuesday"},
  {name:"Molino", rest:"Monday"},
  {name:"Paliparan", rest:"Monday"},
  {name:"San Pedro", rest:"Tuesday"},
  {name:"Pacita", rest:"Monday"},
  {name:"Binan Bayan", rest:"Monday"},
  {name:"Crossing East", rest:"Monday"},
  {name:"Anabu (Yssabelle)", rest:"Tuesday"},
  {name:"Anabu (Ian)", rest:"Monday"}
];

// ================= DOM =================
const storeSelect = document.getElementById("store");
const override = document.getElementById("override");
const totalInput = document.getElementById("total");
const nonapps = document.getElementById("nonapps");
const dateInput = document.getElementById("date");

let todayEntries = [];

// ================= INIT STORES =================
stores.forEach(s=>{
  let opt = document.createElement("option");
  opt.value = s.name;
  opt.text = s.name;
  storeSelect.add(opt);
});

// DATE
dateInput.value = new Date().toISOString().split("T")[0];

// NON APPS RULE
totalInput.addEventListener("input", ()=>{
  const v = Number(totalInput.value);
  nonapps.disabled = !(v === 0 || v === 1);
});

// ================= DAY =================
function getDayName(d){
  return ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"][new Date(d).getDay()];
}

// ================= ADD =================
function addEntry(){

  const storeData = stores.find(s => s.name === storeSelect.value);

  let status =
    override.value ||
    (getDayName(dateInput.value) === storeData.rest ? "Rest Day" : "Working");

  let entry = {
    date: dateInput.value,
    store: storeSelect.value,
    status,
    total: Number(totalInput.value)||0,
    signed: Number(document.getElementById("signed").value)||0,
    rejected: Number(document.getElementById("rejected").value)||0,
    cancelled: Number(document.getElementById("cancelled").value)||0,
    nonapps: nonapps.value || "-"
  };

  todayEntries.push(entry);
  renderPreview();
}

// ================= EDIT =================
function loadToForm(index){

  let e = todayEntries[index];

  dateInput.value = e.date;
  storeSelect.value = e.store;

  totalInput.value = e.total;
  document.getElementById("signed").value = e.signed;
  document.getElementById("rejected").value = e.rejected;
  document.getElementById("cancelled").value = e.cancelled;

  nonapps.value = e.nonapps;

  todayEntries.splice(index,1);
  renderPreview();
}

// ================= PREVIEW =================
function renderPreview(){

  const table = document.getElementById("previewTable");

  table.innerHTML = `
    <tr>
      <th>Date</th><th>Store</th><th>Status</th>
      <th>Total</th><th>Signed</th>
      <th>Rejected</th><th>Cancelled</th><th>Non Apps</th><th>Action</th>
    </tr>
  `;

  todayEntries.forEach((e,i)=>{

    let row = table.insertRow();

    row.insertCell().innerText = e.date;
    row.insertCell().innerText = e.store;
    row.insertCell().innerText = e.status;
    row.insertCell().innerText = e.total;
    row.insertCell().innerText = e.signed;
    row.insertCell().innerText = e.rejected;
    row.insertCell().innerText = e.cancelled;
    row.insertCell().innerText = e.nonapps;

    let cell = row.insertCell();

    let edit = document.createElement("button");
    edit.innerText = "Edit";
    edit.onclick = ()=>loadToForm(i);

    let del = document.createElement("button");
    del.innerText = "Delete";
    del.className = "delete-btn";
    del.onclick = ()=>{ todayEntries.splice(i,1); renderPreview(); };

    cell.appendChild(edit);
    cell.appendChild(del);
  });
}

// ================= SAVE ALL =================
function saveAllToday(){

  if(todayEntries.length === 0) return alert("No entries");

  let batch = db.batch();
  let col = db.collection("reports");

  todayEntries.forEach(e=>{
    let ref = col.doc();
    batch.set(ref,{...e,timestamp:Date.now()});
  });

  batch.commit().then(async ()=>{

    alert("Saved!");

    todayEntries = [];
    renderPreview();

    await recalcMonthlyTotals();
  });
}

// ================= RECALCULATE MONTHLY =================
async function recalcMonthlyTotals(){

  const snap = await db.collection("reports").get();

  let totals = {};

  snap.forEach(doc=>{
    let d = doc.data();

    let month = d.date.substring(0,7);
    let key = month + "_" + d.store;

    if(!totals[key]){
      totals[key] = {
        month,
        store: d.store,
        total:0,
        signed:0,
        rejected:0,
        cancelled:0
      };
    }

    totals[key].total += Number(d.total||0);
    totals[key].signed += Number(d.signed||0);
    totals[key].rejected += Number(d.rejected||0);
    totals[key].cancelled += Number(d.cancelled||0);
  });

  let batch = db.batch();
  let col = db.collection("monthly_totals");

  const old = await col.get();
  old.forEach(doc=>batch.delete(doc.ref));

  Object.values(totals).forEach(t=>{
    let ref = col.doc(t.month + "_" + t.store);
    batch.set(ref,t);
  });

  await batch.commit();
}

// ================= LOAD PREVIOUS =================
function loadPreviousData(){

  db.collection("reports").orderBy("timestamp","desc")
  .onSnapshot(snapshot=>{

    const table = document.getElementById("report");

    table.innerHTML = `
      <tr>
        <th>Date</th><th>Store</th><th>Status</th>
        <th>Total</th><th>Signed</th>
        <th>Rejected</th><th>Cancelled</th><th>Non Apps</th>
      </tr>
    `;

    snapshot.forEach(doc=>{
      let d = doc.data();

      let row = table.insertRow();
      row.insertCell().innerText = d.date;
      row.insertCell().innerText = d.store;
      row.insertCell().innerText = d.status;
      row.insertCell().innerText = d.total;
      row.insertCell().innerText = d.signed;
      row.insertCell().innerText = d.rejected;
      row.insertCell().innerText = d.cancelled;
      row.insertCell().innerText = d.nonapps;
    });
  });
}

// ================= MONTHLY LIVE =================
db.collection("monthly_totals").onSnapshot(snapshot=>{

  const table = document.getElementById("monthlyTotals");

  table.innerHTML = `
    <tr>
      <th>Month</th><th>Store</th>
      <th>Total</th><th>Signed</th>
      <th>Rejected</th><th>Cancelled</th>
    </tr>
  `;

  snapshot.forEach(doc=>{
    let d = doc.data();

    let row = table.insertRow();
    row.insertCell().innerText = d.month;
    row.insertCell().innerText = d.store;
    row.insertCell().innerText = d.total;
    row.insertCell().innerText = d.signed;
    row.insertCell().innerText = d.rejected;
    row.insertCell().innerText = d.cancelled;
  });
});

</script>

</body>
</html>
