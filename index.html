<!DOCTYPE html>
<html>
<head>
  <title>HC/PG SA Monthly Report</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <style>
    body { font-family: Arial; padding: 15px; }
    input, select, button { margin: 5px; padding: 8px; width: 100%; }
    table { border-collapse: collapse; margin-top: 20px; width: 100%; }
    th, td { border: 1px solid black; padding: 6px; text-align: center; font-size: 12px; }

    .delete-btn {
      background: #dc3545;
      color: white;
      border: none;
      padding: 4px 6px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h2>📊 Monthly Store Report (APPEND ONLY FIXED)</h2>

<input type="date" id="date">

<select id="store"></select>

<select id="override">
  <option value="">Auto Status</option>
  <option>Present</option>
  <option>Absent</option>
  <option>On Leave</option>
</select>

<input type="number" id="total" placeholder="Total Apps">
<input type="number" id="signed" placeholder="Signed">
<input type="number" id="rejected" placeholder="Rejected">
<input type="number" id="cancelled" placeholder="Cancelled">

<select id="nonapps" disabled>
  <option value="">Non Apps</option>
  <option value="Yes">Yes</option>
  <option value="No">No</option>
</select>

<button onclick="addEntry()">➕ Add Entry</button>
<button onclick="saveAllToday()">💾 Save All (Today)</button>
<button onclick="clearForm()">🧹 Clear</button>
<button onclick="undoLast()">↩️ Undo</button>

<h3>📦 Today's Entries</h3>
<table id="previewTable"></table>

<h3>📋 Full Report</h3>
<table id="report"></table>

<h3>📅 Monthly Totals (PERMANENT ACCUMULATION)</h3>
<table id="monthlyTotals"></table>

<script>

// FIREBASE
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_AUTH_DOMAIN",
  projectId: "YOUR_PROJECT_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// DOM
const storeSelect = document.getElementById("store");
const override = document.getElementById("override");
const totalInput = document.getElementById("total");
const nonapps = document.getElementById("nonapps");
const dateInput = document.getElementById("date");
const signedInput = document.getElementById("signed");
const rejectedInput = document.getElementById("rejected");
const cancelledInput = document.getElementById("cancelled");

let todayEntries = [];
let historyStack = [];

// STORES
const stores = [
  "Brookside","Manggahan","Bacoor","Dasmarinas","Tanza",
  "Kawit","GMA","San Pedro","Pacita","Paliparan"
];

stores.forEach(s=>{
  let opt=document.createElement("option");
  opt.value=s;
  opt.text=s;
  storeSelect.add(opt);
});

// DATE
dateInput.value = new Date().toISOString().split("T")[0];

// NON APPS RULE
totalInput.addEventListener("input", ()=>{
  const v = Number(totalInput.value);
  nonapps.disabled = !(v === 0 || v === 1);
});

// -------------------------
// 🔥 ADD ENTRY
// -------------------------
function addEntry(){

  if(!dateInput.value || !storeSelect.value){
    return alert("Select date and store");
  }

  let entry = {
    date: dateInput.value,
    store: storeSelect.value,
    total: Number(totalInput.value)||0,
    signed: Number(signedInput.value)||0,
    rejected: Number(rejectedInput.value)||0,
    cancelled: Number(cancelledInput.value)||0,
    nonapps: nonapps.value || "-"
  };

  todayEntries.push(entry);
  renderPreview();
  clearForm();
}

// -------------------------
// 🧹 CLEAR FORM
// -------------------------
function clearForm(){
  storeSelect.selectedIndex = 0;
  totalInput.value = "";
  signedInput.value = "";
  rejectedInput.value = "";
  cancelledInput.value = "";
  nonapps.value = "";
}

// -------------------------
// 📦 SAVE ALL TODAY
// -------------------------
function saveAllToday(){

  if(todayEntries.length === 0){
    return alert("No entries");
  }

  let batch = db.batch();
  let col = db.collection("reports");

  todayEntries.forEach(e=>{
    let ref = col.doc();
    batch.set(ref, {...e, timestamp: Date.now()});
  });

  batch.commit().then(()=>{

    // 🔥 IMPORTANT: update monthly totals (APPEND ONLY)
    todayEntries.forEach(e=>{
      updateMonthlyTotals(e);
    });

    alert("Saved!");
    todayEntries = [];
    renderPreview();
  });
}

// -------------------------
// 🔥 APPEND ONLY MONTHLY TOTALS (KEY FIX)
// -------------------------
function updateMonthlyTotals(entry){

  const month = entry.date.substring(0,7);
  const docId = month + "_" + entry.store;

  const ref = db.collection("monthly_totals").doc(docId);

  return db.runTransaction(async (tx)=>{

    const snap = await tx.get(ref);

    if(!snap.exists){

      tx.set(ref,{
        month,
        store: entry.store,
        total: entry.total,
        signed: entry.signed,
        rejected: entry.rejected,
        cancelled: entry.cancelled
      });

    } else {

      let d = snap.data();

      tx.update(ref,{
        total: (d.total || 0) + entry.total,
        signed: (d.signed || 0) + entry.signed,
        rejected: (d.rejected || 0) + entry.rejected,
        cancelled: (d.cancelled || 0) + entry.cancelled
      });

    }
  });
}

// -------------------------
// 🔄 LOAD MONTHLY TOTALS (REALTIME)
// -------------------------
db.collection("monthly_totals").onSnapshot(snapshot=>{

  const table = document.getElementById("monthlyTotals");

  table.innerHTML = `
    <tr>
      <th>Month</th><th>Store</th>
      <th>Total</th><th>Signed</th>
      <th>Rejected</th><th>Cancelled</th>
    </tr>
  `;

  snapshot.forEach(doc=>{

    let d = doc.data();

    let row = table.insertRow();
    row.insertCell().innerText = d.month;
    row.insertCell().innerText = d.store;
    row.insertCell().innerText = d.total;
    row.insertCell().innerText = d.signed;
    row.insertCell().innerText = d.rejected;
    row.insertCell().innerText = d.cancelled;
  });
});

// -------------------------
// 📦 PREVIEW TABLE
// -------------------------
function renderPreview(){

  const table = document.getElementById("previewTable");

  table.innerHTML = `
    <tr>
      <th>Date</th><th>Store</th><th>Total</th>
      <th>Signed</th><th>Rejected</th>
      <th>Cancelled</th><th>Non Apps</th>
    </tr>
  `;

  todayEntries.forEach(e=>{
    let row = table.insertRow();
    row.insertCell().innerText = e.date;
    row.insertCell().innerText = e.store;
    row.insertCell().innerText = e.total;
    row.insertCell().innerText = e.signed;
    row.insertCell().innerText = e.rejected;
    row.insertCell().innerText = e.cancelled;
    row.insertCell().innerText = e.nonapps;
  });
}

// -------------------------
// ↩️ UNDO (LOCAL ONLY)
// -------------------------
function undoLast(){
  if(todayEntries.length === 0){
    return alert("Nothing to undo");
  }

  todayEntries.pop();
  renderPreview();
}

</script>

</body>
</html>
