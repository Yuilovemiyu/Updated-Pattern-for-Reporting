<!DOCTYPE html>
<html>
<head>
  <title>HC/PG SA Monthly Report</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

  <style>
    body { font-family: Arial; padding: 15px; }

    input, select, button {
      margin: 5px;
      padding: 8px;
      width: 100%;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      margin-top: 10px;
    }

    th, td {
      border: 1px solid #000;
      padding: 6px;
      text-align: center;
      font-size: 12px;
    }

    #authBox { max-width: 400px; margin:auto; }
    #app { display:none; }

    #bonusModal {
      display:none;
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.7);
      z-index:9999;
    }

    #bonusBox {
      width:95%;
      height:90%;
      margin:20px auto;
      background:#fff;
      border-radius:10px;
      overflow:hidden;
    }

    #bonusBox header {
      background:#005bac;
      color:white;
      padding:10px;
      display:flex;
      justify-content:space-between;
    }

    #bonusBox iframe {
      width:100%;
      height:calc(100% - 50px);
      border:none;
    }

    #closeBtn {
      background:red;
      color:white;
      border:none;
      padding:5px 10px;
    }
  </style>
</head>

<body>

<!-- 🔐 AUTH -->
<div id="authBox">
  <h2>Login</h2>

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <h3>Sign Up Info</h3>

  <!-- 🆕 ADDED STORE + REST DAY -->
  <select id="signupStore">
    <option value="">Select Store</option>
  </select>

  <select id="restDay">
    <option value="">Select Rest Day</option>
    <option>Monday</option>
    <option>Tuesday</option>
    <option>Wednesday</option>
    <option>Thursday</option>
    <option>Friday</option>
    <option>Saturday</option>
    <option>Sunday</option>
  </select>

  <button onclick="login()">Login</button>
  <button onclick="signup()">Sign Up</button>
</div>

<!-- 📊 APP -->
<div id="app">

<h2>📊 HC/PG SA Monthly Report</h2>

<button onclick="logout()">Logout</button>

<input type="date" id="date">
<select id="store"></select>

<input type="number" id="total" placeholder="Total Apps">
<input type="number" id="signed" placeholder="Signed">
<input type="number" id="rejected" placeholder="Rejected">
<input type="number" id="cancelled" placeholder="Cancelled">

<select id="nonapps" disabled>
  <option value="">Non Apps</option>
  <option value="Yes">Yes</option>
  <option value="No">No</option>
</select>

<button onclick="addEntry()">➕ Add Entry</button>
<button onclick="saveAllToday()">💾 Save All</button>

<h3>📦 Preview</h3>
<table id="previewTable"></table>

<h3>📅 Daily Report</h3>

<input type="date" id="filterDate">
<button onclick="loadDayReport()">🔍 Load Day</button>

<h4 id="dayTitle"></h4>
<table id="dayReportTable"></table>

<h3>📊 Monthly Totals</h3>
<table id="monthlyTotals"></table>

</div>

<script>

/////////////////////////////
// FIREBASE
/////////////////////////////
firebase.initializeApp({
  apiKey: "AIzaSyADXlQJcV5KJXTfYBK5qscv7gd88-XNlKo",
  authDomain: "today-s-reporter-3dceb.firebaseapp.com",
  projectId: "today-s-reporter-3dceb"
});

const auth = firebase.auth();
const db = firebase.firestore();

/////////////////////////////
// STORES
/////////////////////////////
const stores = [
  "Brookside","Manggahan","Bacoor","Dasmarinas","Gentri Jr.",
  "Tanza","Kawit","Tanza Paradahan","GMA","Tagaytay",
  "Molino","Paliparan","San Pedro","Pacita",
  "Binan Bayan","Crossing East","Anabu (Yssabelle)","Anabu (Ian)"
];

/////////////////////////////
// POPULATE STORES (APP + SIGNUP)
/////////////////////////////
stores.forEach(s=>{
  let opt1=document.createElement("option");
  opt1.value=s; opt1.text=s;
  store.appendChild(opt1);

  let opt2=document.createElement("option");
  opt2.value=s; opt2.text=s;
  signupStore.appendChild(opt2);
});

/////////////////////////////
// SIGNUP (WITH STORE + REST DAY) 🆕
/////////////////////////////
function signup(){

  if(!signupStore.value || !restDay.value){
    alert("Please select store and rest day");
    return;
  }

  auth.createUserWithEmailAndPassword(email.value, password.value)
  .then(async (user)=>{

    await db.collection("users").doc(user.user.uid).set({
      email: email.value,
      store: signupStore.value,
      restDay: restDay.value
    });

    alert("Signup successful!");
  })
  .catch(err=>{
    alert(err.message);
  });
}

/////////////////////////////
// LOGIN
/////////////////////////////
function login(){
  auth.signInWithEmailAndPassword(email.value,password.value)
  .catch(e=>alert(e.message));
}

function logout(){
  auth.signOut();
}

auth.onAuthStateChanged(user=>{
  if(user){
    authBox.style.display="none";
    app.style.display="block";
  } else {
    authBox.style.display="block";
    app.style.display="none";
  }
});

/////////////////////////////
// REPORT SYSTEM (UNCHANGED LOGIC)
/////////////////////////////
let todayEntries=[];

function addEntry(){

  todayEntries.push({
    date:date.value,
    store:store.value,
    total:Number(total.value||0),
    signed:Number(signed.value||0),
    rejected:Number(rejected.value||0),
    cancelled:Number(cancelled.value||0),
    nonapps:nonapps.value||"-"
  });

  renderPreview();
}

function renderPreview(){
  previewTable.innerHTML="<tr><th>Date</th><th>Store</th><th>Total</th></tr>";

  todayEntries.forEach(e=>{
    previewTable.innerHTML+=`
    <tr>
      <td>${e.date}</td>
      <td>${e.store}</td>
      <td>${e.total}</td>
    </tr>`;
  });
}

async function saveAllToday(){
  const batch=db.batch();

  todayEntries.forEach(e=>{
    batch.set(db.collection("reports").doc(),e);
  });

  await batch.commit();
  todayEntries=[];
  renderPreview();
}

/////////////////////////////
// DAILY REPORT FIXED
/////////////////////////////
function loadDayReport(){

  const day=filterDate.value;
  dayTitle.innerText="Daily: "+day;

  db.collection("reports")
  .where("date","==",day)
  .onSnapshot(snap=>{

    dayReportTable.innerHTML=`
    <tr><th>Date</th><th>Store</th><th>Total</th></tr>`;

    snap.forEach(doc=>{
      const d=doc.data();

      dayReportTable.innerHTML+=`
      <tr>
        <td>${d.date}</td>
        <td>${d.store}</td>
        <td>${d.total}</td>
      </tr>`;
    });
  });
}

/////////////////////////////
// INIT
/////////////////////////////
window.onload=()=>{
  date.value=new Date().toISOString().split("T")[0];
  filterDate.value=date.value;
};

</script>

</body>
</html>
