<!DOCTYPE html>
<html>
<head>
  <title>HC/PG SA Report System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="manifest" href="manifest.json">

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <style>
    body { font-family: Arial; padding: 15px; }
    input, select, button { width: 100%; padding: 8px; margin: 5px 0; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th, td { border: 1px solid #000; font-size: 12px; text-align: center; padding: 6px; }
  </style>
</head>

<body>

<!-- AUTH -->
<div id="authBox">
  <h3>Login</h3>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button onclick="login()">Login</button>
  <button onclick="signup()">Sign Up</button>

  <div id="profileSetup" style="display:none;">
    <h4>Setup Profile</h4>

    <select id="userStore"></select>

    <label>Rest Days</label>
    <select id="restDays" multiple>
      <option>Sunday</option>
      <option>Monday</option>
      <option>Tuesday</option>
      <option>Wednesday</option>
      <option>Thursday</option>
      <option>Friday</option>
      <option>Saturday</option>
    </select>

    <button onclick="saveProfile()">Save Profile</button>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<button onclick="logout()">Logout</button>

<h2>Report System</h2>

<input type="date" id="date">

<select id="store"></select>

<input id="total" type="number" placeholder="Total">
<input id="signed" type="number" placeholder="Signed">
<input id="rejected" type="number" placeholder="Rejected">
<input id="cancelled" type="number" placeholder="Cancelled">

<select id="nonapps">
  <option value="">Non Apps</option>
  <option>Yes</option>
  <option>No</option>
</select>

<button onclick="addEntry()">Add</button>
<button onclick="saveAll()">Save</button>

<table id="table"></table>

</div>

<script>

/////////////////////////////
// 🔥 FIREBASE (INSERTED EXACT)
/////////////////////////////
firebase.initializeApp({
  apiKey: "AIzaSyADXlQJcV5KJXTfYBK5qscv7gd88-XNlKo",
  authDomain: "today-s-reporter-3dceb.firebaseapp.com",
  projectId: "today-s-reporter-3dceb"
});

const db = firebase.firestore();
const auth = firebase.auth();

/////////////////////////////
// STORES
/////////////////////////////
const stores = ["Brookside","Manggahan","Bacoor","Dasmarinas","Gentri Jr.",
"Tanza","Kawit","Tanza Paradahan","GMA","Tagaytay","Molino","Paliparan",
"San Pedro","Pacita","Binan Bayan","Crossing East","Anabu (Yssabelle)","Anabu (Ian)","Rosario"];

stores.forEach(s=>{
  userStore.innerHTML += `<option>${s}</option>`;
  store.innerHTML += `<option>${s}</option>`;
});

/////////////////////////////
// STATE
/////////////////////////////
let profile=null;
let isAdmin=false;
let temp=[];

const n=v=>isNaN(parseFloat(v))?0:parseFloat(v);

/////////////////////////////
// LOGIN
/////////////////////////////
function login(){
  auth.signInWithEmailAndPassword(email.value,password.value)
  .catch(e=>alert(e.message));
}

function signup(){
  auth.createUserWithEmailAndPassword(email.value,password.value)
  .then(()=>profileSetup.style.display="block")
  .catch(e=>alert(e.message));
}

function logout(){
  auth.signOut();
}

/////////////////////////////
// SAVE PROFILE (NO ROLE HERE - SECURE)
/////////////////////////////
async function saveProfile(){
  const user=auth.currentUser;

  await db.collection("users").doc(user.uid).set({
    email:user.email,
    store:userStore.value,
    restDays:[...restDays.selectedOptions].map(o=>o.value)
  });

  profileSetup.style.display="none";
}

/////////////////////////////
// AUTH STATE + ADMIN CHECK
/////////////////////////////
auth.onAuthStateChanged(async user=>{
  if(!user){
    authBox.style.display="block";
    app.style.display="none";
    return;
  }

  const token = await user.getIdTokenResult();
  isAdmin = token.claims.admin === true;

  const doc = await db.collection("users").doc(user.uid).get();

  if(!doc.exists){
    profileSetup.style.display="block";
    return;
  }

  profile = doc.data();

  store.value = profile.store;
  store.disabled = !isAdmin;

  authBox.style.display="none";
  app.style.display="block";
});

/////////////////////////////
// ADD ENTRY
/////////////////////////////
function addEntry(){
  temp.push({
    date:date.value,
    store:profile.store,
    total:n(total.value),
    signed:n(signed.value),
    rejected:n(rejected.value),
    cancelled:n(cancelled.value),
    nonapps:nonapps.value
  });

  render();
}

function render(){
  table.innerHTML="<tr><th>Date</th><th>Store</th><th>Total</th></tr>";

  temp.forEach(e=>{
    table.innerHTML+=`<tr>
      <td>${e.date}</td>
      <td>${e.store}</td>
      <td>${e.total}</td>
    </tr>`;
  });
}

/////////////////////////////
// SAVE
/////////////////////////////
async function saveAll(){
  const batch=db.batch();

  temp.forEach(e=>{
    const id=e.date+"_"+e.store;
    batch.set(db.collection("reports").doc(id),e);
  });

  await batch.commit();
  temp=[];
  render();
}

</script>

</body>
</html>
